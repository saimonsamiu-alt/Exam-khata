<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>পরীক্ষার খাতা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F6FB; --paper-edge:#E7EEF6; --rule:#C9D8E8; --margin-red:#BF3A2C;
    --ink:#1F2A44; --pencil:#5B6472; --gold:#D9A441; --green:#2F7D5A; --red:#BF3A2C;
    --card-shadow: 0 2px 0 rgba(31,42,68,0.06), 0 8px 24px -12px rgba(31,42,68,0.18);
    --font-display:'Kalam', cursive; --font-body:'Noto Sans Bengali','Inter',sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body); color:var(--ink);
    background: repeating-linear-gradient(var(--paper) 0px, var(--paper) 31px, var(--rule) 32px), var(--paper);
    min-height:100vh; position:relative; padding:0 0 40px 0;
  }
  body::before{ content:""; position:fixed; top:0; bottom:0; left:44px; width:2px; background:var(--margin-red); opacity:0.55; z-index:0; }
  .holes{ position:fixed; left:14px; top:0; bottom:0; display:flex; flex-direction:column; justify-content:space-evenly; z-index:0; pointer-events:none; }
  .holes span{ width:12px;height:12px;border-radius:50%; background:var(--paper-edge); box-shadow: inset 0 1px 3px rgba(31,42,68,0.25); }
  .wrap{ position:relative; z-index:1; max-width:640px; margin:0 auto; padding:28px 20px 20px 64px; }
  header.top{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
  .logo{ font-family:var(--font-display); font-weight:700; font-size:30px; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .logo .dot{ color:var(--margin-red); }
  .tagline{ font-size:13px; color:var(--pencil); }
  .card{ background:#fff; border-radius:10px; box-shadow:var(--card-shadow); padding:22px; margin-bottom:18px; border:1px solid var(--paper-edge); }
  h1,h2,h3{ font-family:var(--font-display); margin:0 0 12px 0; color:var(--ink); font-weight:700; }
  h1{font-size:26px;} h2{font-size:21px;} h3{font-size:17px;}
  p.hint{ color:var(--pencil); font-size:13.5px; margin:0 0 14px 0; line-height:1.5; }
  label.field-label{ display:block; font-size:13px; color:var(--pencil); margin-bottom:6px; font-weight:600; }
  input[type=text], input[type=number], input[type=password], input[type=tel], select, textarea{
    width:100%; padding:11px 12px; border-radius:7px; border:1.5px solid var(--rule); background:#FBFDFF;
    font-family:var(--font-body); font-size:15px; color:var(--ink); margin-bottom:14px; outline:none;
  }
  textarea{ font-family:var(--font-mono); font-size:13px; min-height:160px; resize:vertical; }
  input:focus, textarea:focus, select:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(217,164,65,0.18); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; font-family:var(--font-body); font-weight:600; font-size:14.5px;
    padding:12px 18px; border-radius:8px; border:none; cursor:pointer; transition:transform .08s ease, box-shadow .08s ease; }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--ink); color:#fff; }
  .btn-primary:hover{ box-shadow:0 4px 14px -4px rgba(31,42,68,0.5); }
  .btn-gold{ background:var(--gold); color:#3a2a06; }
  .btn-outline{ background:transparent; color:var(--ink); border:1.5px solid var(--rule); }
  .btn-danger{ background:transparent; color:var(--red); border:1.5px solid rgba(191,58,44,0.35); }
  .btn-block{ width:100%; }
  .btn[disabled]{ opacity:0.5; cursor:not-allowed; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; }
  .row > *{ flex:1; }
  .exam-item{ border:1px solid var(--paper-edge); border-radius:9px; padding:14px 16px; margin-bottom:12px; background:#FCFDFE; }
  .exam-item .row-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .exam-item .code-chip{ font-family:var(--font-mono); background:var(--ink); color:#fff; padding:4px 9px; border-radius:6px; font-size:13px; letter-spacing:1px; }
  .meta{ color:var(--pencil); font-size:12.5px; margin-top:4px; }
  .q-block{ padding:16px 0; border-bottom:1px dashed var(--rule); }
  .q-block:last-child{ border-bottom:none; }
  .q-num{ display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; border:2px solid var(--margin-red);
    color:var(--margin-red); font-family:var(--font-mono); font-weight:700; font-size:13px; margin-inline-end:8px; }
  .q-tag{ font-family:var(--font-mono); font-size:11px; color:var(--pencil); background:#EEF3F8; padding:2px 7px; border-radius:5px; }
  .q-text{ font-weight:600; font-size:15.5px; margin-bottom:12px; }
  .bubble-opt{ display:flex; align-items:center; gap:10px; padding:9px 6px; border-radius:7px; cursor:pointer; }
  .bubble-opt:hover{ background:#F5F9FE; }
  .bubble-opt.locked{ opacity:0.65; cursor:default; }
  .bubble-opt.locked:hover{ background:none; }
  .bubble{ width:24px; height:24px; min-width:24px; border-radius:50%; border:2px solid var(--pencil); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-size:11px; color:var(--pencil); font-weight:700; transition: all .12s ease; }
  input[type=radio]{ display:none; }
  input[type=radio]:checked + .bubble{ background:var(--ink); border-color:var(--ink); color:#fff; }
  .opt-text{ font-size:14.5px; color:var(--ink); }
  .opt-input{ flex:1; padding:8px 10px; border-radius:6px; border:1.5px solid var(--rule); font-family:var(--font-body); font-size:14px; margin-bottom:0; }
  .timer-chip{ position:sticky; top:10px; z-index:5; display:inline-flex; align-items:center; gap:8px; background:var(--ink); color:#fff;
    font-family:var(--font-mono); font-weight:700; font-size:15px; padding:8px 14px; border-radius:20px; box-shadow:0 4px 14px -4px rgba(31,42,68,0.5); float:right; }
  .timer-chip.low{ background:var(--red); }
  .timer-dot{ width:8px; height:8px; border-radius:50%; background:var(--gold); animation:pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }
  table.results{ width:100%; border-collapse:collapse; font-size:14px; }
  table.results th{ text-align:start; color:var(--pencil); font-weight:600; padding:8px 6px; border-bottom:2px solid var(--rule); font-size:12.5px; }
  table.results td{ padding:9px 6px; border-bottom:1px dashed var(--rule); }
  .rank1{ color:var(--gold); font-weight:700; }
  .score-big{ font-family:var(--font-mono); font-weight:700; }
  .score-pass{ color:var(--green); }
  .score-fail{ color:var(--red); }
  a.link-back{ color:var(--pencil); font-size:13.5px; cursor:pointer; text-decoration:underline; }
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:20px;
    font-size:13.5px; box-shadow:0 6px 20px -6px rgba(0,0,0,0.4); z-index:50; opacity:0; transition:opacity .25s ease; }
  .toast.show{ opacity:1; }
  .stamp{ display:inline-block; border:3px solid var(--green); color:var(--green); border-radius:50%; padding:14px 18px;
    font-family:var(--font-display); font-weight:700; font-size:22px; transform:rotate(-8deg); }
  .stamp.fail{ border-color:var(--red); color:var(--red); }
  .center{ text-align:center; }
  .empty-state{ text-align:center; padding:30px 10px; color:var(--pencil); }
  .credit{ text-align:center; font-size:11.5px; color:var(--pencil); opacity:0.85; margin-top:6px; letter-spacing:0.2px; }
  .brand-logo{ width:34px; height:34px; border-radius:8px; object-fit:cover; margin-inline-end:4px; vertical-align:middle; box-shadow:0 2px 6px -2px rgba(31,42,68,0.4); }
  .info-btn{ background:none; border:none; font-size:13px; color:var(--pencil); cursor:pointer; opacity:0.8; padding:4px 8px; display:inline-flex; align-items:center; gap:4px; border:1px solid var(--rule); border-radius:14px; }
  .info-btn:hover{ opacity:1; border-color:var(--gold); }
  .info-label{ font-family:var(--font-body); font-size:11.5px; font-weight:600; }
  .about-overlay{ position:fixed; inset:0; background:rgba(15,20,32,0.55); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; }
  .about-card{ background:#fff; border-radius:14px; padding:26px 24px; max-width:340px; width:100%; text-align:center; box-shadow:0 20px 60px -20px rgba(0,0,0,0.5); }
  .about-logo{ width:88px; height:88px; border-radius:50%; object-fit:cover; box-shadow:0 4px 14px -4px rgba(31,42,68,0.4); border:3px solid var(--gold); }
  .check-seq{ padding:30px 6px; text-align:center; }
  .check-line{ display:flex; align-items:center; gap:10px; justify-content:center; padding:9px 0; font-family:var(--font-mono); font-size:14px; color:var(--pencil); opacity:0; transition:opacity .3s ease; }
  .check-line.show{ opacity:1; }
  .check-line .tick{ color:var(--green); font-weight:700; }
  .qprog{ font-family:var(--font-mono); font-size:12.5px; color:var(--pencil); margin-bottom:6px; }
  .review-block{ padding:12px 0; border-bottom:1px dashed var(--rule); }
  .review-block:last-child{ border-bottom:none; }
  .review-ans{ font-size:13.5px; margin-top:4px; }
  .review-ans.right{ color:var(--green); }
  .review-ans.wrong{ color:var(--red); }
  .detail-wrap{ display:none; margin-top:10px; padding-top:10px; border-top:1px dashed var(--rule); }
  .detail-wrap.open{ display:block; }
  ::selection{ background:rgba(217,164,65,0.35); }
  @media (max-width:480px){ .wrap{ padding:20px 14px 20px 50px; } body::before{ left:34px; } .holes{ left:10px; } }
</style>
</head>

let timeLeft = 0;
let initialTime = 0;
let currentQuestionIndex = 0; // for active quiz navigation

// LocalStorage Hydration safely wrapped
try {
  const cached = localStorage.getItem('khata_exams_data_v3');
  if (cached) examsList = JSON.parse(cached);
} catch (e) {
  console.error("Storage load failed:", e);
}

function persistState() {
  try {
    localStorage.setItem('khata_exams_data_v3', JSON.stringify(examsList));
  } catch (e) {
    console.error("Storage save failed:", e);
  }
}

// Helper to update toast alerts dynamically
function showToast(msg, duration = 2500) {
  toastEl.innerText = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), duration);
}

// Dynamic rule page layout decor configuration
function renderHoles() {
  const holesContainer = document.getElementById('holes');
  holesContainer.innerHTML = '';
  const totalHoles = window.innerHeight > 600 ? 10 : 6;
  for (let i = 0; i < totalHoles; i++) {
    holesContainer.appendChild(document.createElement('span'));
  }
}
window.addEventListener('resize', renderHoles);
renderHoles();

// -------------------------------------------------------------------------
// Layout Base Framework Orchestrators
// -------------------------------------------------------------------------
function switchView(viewName) {
  currentView = viewName;
  window.scrollTo(0, 0);
  if (timerInterval && viewName !== 'exam-session') {
    clearInterval(timerInterval);
  }
  renderApp();
}

function renderApp() {
  app.innerHTML = '';
  
  if (currentView === 'auth') renderAuthView();
  else if (currentView === 'teacher-dashboard') renderTeacherDashboard();
  else if (currentView === 'create-exam') renderCreateExamView();
  else if (currentView === 'student-dashboard') renderStudentDashboard();
  else if (currentView === 'exam-session') renderExamSessionView();
  else if (currentView === 'checking-seq') renderCheckingSeqView();
  else if (currentView === 'result-view') renderResultView();
}

          <input type="number" id="exam-pos-mark" value="1" step="0.1">
        </div>
        <div>
          <label class="field-label">ভুল উত্তরের নেগেটিভ নম্বর (-)</label>
          <input type="number" id="exam-neg-mark" value="0.25" step="0.01">
        </div>
      </div>
    </div>

    <h2 style="margin:16px 0 12px 4px;">প্রশ্ন ও ওএমআর বাবল সেটআপ</h2>
    <div id="questions-builder-container"></div>
    
    <div style="margin:16px 0 30px 0; display:flex; gap:10px;">
      <button class="btn btn-outline" id="add-q-btn" style="flex:1;">➕ নতুন প্রশ্ন যোগ করুন</button>

    qCount++;

    qBox.className = 'card';
    qBox.style.padding = '16px';
    qBox.style.marginBottom = '12px';
    qBox.setAttribute('data-q-idx', qCount);
    
    qBox.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span class="q-num" style="margin:0; width:24px; height:24px; font-size:11px;">${qCount}</span>
        <button class="btn btn-danger" style="padding:4px 8px; font-size:11px; background:none;" onclick="this.closest('.card').remove(); reIndexQuestions();">বাদ দিন</button>

      <label class="field-label">মূল প্রশ্নপত্র (অপশনাল - শিক্ষকের সুবিধার জন্য)</label>

      <div style="display:flex; gap:12px; margin-top:6px;">
        <label style="display:inline-flex; align-items:center; gap:4px; cursor:pointer;">
          <input type="radio" name="ans-key-${qCount}" value="ক" checked> ক
        </label>
        <label style="display:inline-flex; align-items:center; gap:4px; cursor:pointer;">
          <input type="radio" name="ans-key-${qCount}" value="খ"> খ
        </label>
        <label style="display:inline-flex; align-items:center; gap:4px; cursor:pointer;">
          <input type="radio" name="ans-key-${qCount}" value="গ"> গ
        </label>
        <label style="display:inline-flex; align-items:center; gap:4px; cursor:pointer;">
          <input type="radio" name="ans-key-${qCount}" value="ঘ"> ঘ
        </label>
      </div>
    `;
    builderContainer.appendChild(qBox);
  }

  window.reIndexQuestions = function() {
    const boxes = builderContainer.querySelectorAll('[data-q-idx]');
    qCount = 0;
    boxes.forEach((box) => {
      qCount++;
      box.setAttribute('data-q-idx', qCount);
      box.querySelector('.q-num').innerText = qCount;
      const radios = box.querySelectorAll('input[type="radio"]');
      radios.forEach(r => r.setAttribute('name', `ans-key-${qCount}`));
    });
  };

  // Pre-populate with 5 items
  for(let i=0; i<5; i++) addQuestionRow();

  container.querySelector('#add-q-btn').onclick = () => addQuestionRow();
  container.querySelector('#back-dash-btn').onclick = () => switchView('teacher-dashboard');
  
  container.querySelector('#save-exam-btn').onclick = () => {
    const title = container.querySelector('#exam-title').value.trim();
    const code = container.querySelector('#exam-code').value.trim();
    const duration = parseInt(container.querySelector('#exam-duration').value);
    const posMark = parseFloat(container.querySelector('#exam-pos-mark').value) || 1;
    const negMark = parseFloat(container.querySelector('#exam-neg-mark').value) || 0;
    
    if(!title || !code) {
      showToast("পরীক্ষার নাম এবং ৪ ডিজিটের কোড আবশ্যক!");
      return;
    }
    if(code.length !== 4) {
      showToast("পরীক্ষার কোড অবশ্যই ৪ ডিজিটের হতে হবে!");
      return;
    }
    
    const questions = [];
    const boxes = builderContainer.querySelectorAll('[data-q-idx]');
    if(boxes.length === 0) {
      showToast("অন্তত ১টি প্রশ্ন বা ওএমআর বাবল সেট করুন!");
      return;
    }

    let valid = true;
    boxes.forEach((box) => {
      const idx = box.getAttribute('data-q-idx');
      let text = box.querySelector('.q-text-input').value.trim();
      if(!text) text = `প্রশ্ন নম্বর ${idx}`;
      
      const selectedRadio = box.querySelector(`input[name="ans-key-${idx}"]:checked`);
      const correctKey = selectedRadio ? selectedRadio.value : 'ক';
      
      questions.push({
        text: text,
        correctKey: correctKey
      });
    });

    const newExam = {
      title: title,
      code: code,
      duration: duration || 20,
      posMark: posMark,
      negMark: negMark,
      questions: questions,
      submissions: []
    };

    examsList.push(newExam);
    persistState();
    showToast("পরীক্ষাটি সফলভাবে তৈরি ও সংরক্ষিত হয়েছে!");
    switchView('teacher-dashboard');
  };
}

window.verifyAndStartExam = function(code) {
  const exam = examsList.find(e => e.code === code);
  if(!exam) {
    showToast("এই কোডের কোন পরীক্ষা খুঁজে পাওয়া যায়নি!");
    return;
  }
  
  // Prompt for Student(private) Identity Name
  const studentName = prompt("পরীক্ষার্থীর নাম (English/বাংলায়) লিখুন:");
  if(!studentName || studentName.trim() === "") {
    showToast("পরীক্ষার্থীর নাম দেওয়া বাধ্যতামূলক!");
    return;
  }
  
  const rollStr = prompt("পরীক্ষার্থীর রোল নম্বর লিখুন:");
  const studentRoll = rollStr ? rollStr.trim() : "N/A";

  // Initializing active session tracking details
  currentExam = exam;
  currentExam.activeStudentName = studentName.trim();
  currentExam.activeStudentRoll = studentRoll;
  currentAnswers = {};
  timeLeft = exam.duration * 60;
  initialTime = timeLeft;
  currentQuestionIndex = 0;
  
  switchView('exam-session');
};

  actionWrap.style.marginTop = '16px';

  prevBtn.onclick = () => { currentQuestionIndex--; renderExamSessionView(); };

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-outline';
  nextBtn.style.flex = '1';
  if (currentQuestionIndex === totalQ - 1) {
    nextBtn.innerText = 'পর্যালোচনা ▶';
  } else {
    nextBtn.innerText = 'পরেরটি ▶';
  }
  nextBtn.onclick = () => {
    if (currentQuestionIndex < totalQ - 1) {
      currentQuestionIndex++;
      renderExamSessionView();
    } else {
      showReviewGridModal();
    }
  };

  actionWrap.appendChild(prevBtn);
  actionWrap.appendChild(nextBtn);
  container.appendChild(actionWrap);

  // Universal explicit bottom form submission wrapper triggers
  const submitBlock = document.createElement('div');
  submitBlock.style.marginTop = '28px';
  submitBlock.innerHTML = `
    <button class="btn btn-primary btn-block" style="background:var(--margin-red); padding:12px;" onclick="triggerExamSubmission(false)">
      🔒 ওএমআর খাতা জমা দিন (Submit Screen)
    </button>
  `;
  container.appendChild(submitBlock);

  app.innerHTML = '';
  app.appendChild(container);

  // Initialize background timing loop countdown sequence handles safely context-ready
  startSessionTimerLoop();
}

window.saveActiveOption = function(optVal) {
  currentAnswers[currentQuestionIndex] = optVal;
};

function startSessionTimerLoop() {
  if (timerInterval) clearInterval(timerInterval);
  
  const timerText = document.getElementById('timer-text');
  const chip = document.getElementById('session-timer-chip');
  
  function updateDisplay() {
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if(timerText) timerText.innerText = "00:00";
      showToast("সময় শেষ! আপনার ওএমআর খাতা স্বয়ংক্রিয়ভাবে জমা নেওয়া হচ্ছে।");
      triggerExamSubmission(true);
      return;
    }
    
    let mins = Math.floor(timeLeft / 60);
    let secs = timeLeft % 60;
    if(mins < 10) mins = '0' + mins;
    if(secs < 10) secs = '0' + secs;
    
    if(timerText) timerText.innerText = `${mins}:${secs}`;
    
    // Low time visual warnings check boundaries limit alerts
    if (timeLeft <= 60 && chip) {
      chip.classList.add('low');
    }
    timeLeft--;
  }
  
  updateDisplay();
  timerInterval = setInterval(updateDisplay, 1000);
}

  `;
  app.appendChild(container);

  // Multi-staged visual feedback intervals cascade execution routines animation
  setTimeout(() => document.getElementById('line-1').classList.add('show'), 600);
  setTimeout(() => document.getElementById('line-2').classList.add('show'), 1300);
  setTimeout(() => document.getElementById('line-3').classList.add('show'), 2000);
  
  setTimeout(() => {

  }, 2800);

function processScoresAndSave() {
  let score = 0;
  let correctCount = 0;
  let wrongCount = 0;
  let blankCount = 0;
  
  const breakdownLog = [];

  currentExam.questions.forEach((q, i) => {
    const studentAns = currentAnswers[i] || null;
    const correctKey = q.correctKey;
    
    let status = 'blank'; // right, wrong, blank
    if (studentAns) {
      if (studentAns === correctKey) {
        status = 'right';
        score += currentExam.posMark;
        correctCount++;
      } else {
        status = 'wrong';
        score -= currentExam.negMark;
        wrongCount++;
      }
    } else {
      blankCount++;
    }

    breakdownLog.push({
      qNum: i + 1,
      text: q.text,
      correctKey: correctKey,
      studentAns: studentAns,
      status: status
    });
  });

  // Structural enforcement safe formatting standard truncation checks
  score = Math.round(score * 100) / 100;

  const submissionRecord = {
    studentName: currentExam.activeStudentName,
    studentRoll: currentExam.activeStudentRoll,
    score: score,
    correctCount: correctCount,
    wrongCount: wrongCount,
    blankCount: blankCount,
    breakdown: breakdownLog,
    timestamp: new Date().toLocaleTimeString()
  };

  // Injecting directly target reference state database tree updates mutations saves safely
  const targetExam = examsList.find(e => e.code === currentExam.code);
  if (targetExam) {
    if(!targetExam.submissions) targetExam.submissions = [];
    targetExam.submissions.push(submissionRecord);
    persistState();
  }

  // Passing dynamic reference handles globally safe to load into rendering layers interfaces
  currentExam.latestSubmission = submissionRecord;
  switchView('result-view');
}

        <div class="score-big ${isPassed?'score-pass':'score-fail'}" style="font-size:42px; line-height:1.2;">${record.score}</div>
        <div class="meta" style="margin-top:4px; font-size:12px;">মোট প্রশ্ন সংখ্যা: ${totalQuestions}টি</div>

        <tr><td>👤 পরীক্ষার্থীর নাম:</td><td style="text-align:end; font-weight:600;">${record.studentName}</td></tr>
        <tr><td>🆔 রোল নম্বর:</td><td style="text-align:end; font-family:var(--font-mono); font-weight:700;">${record.studentRoll}</td></tr>
        <tr><td>🟢 সঠিক উত্তর সংখ্যা:</td><td style="text-align:end; color:var(--green); font-weight:600;">${record.correctCount}টি</td></tr>
        <tr><td>🔴 ভুল উত্তর সংখ্যা:</td><td style="text-align:end; color:var(--red); font-weight:600;">${record.wrongCount}টি</td></tr>
        <tr><td>⚪ অনুত্তরিত বাবল (Blank):</td><td style="text-align:end; color:var(--pencil);">${record.blankCount}টি</td></tr>

window.viewSubmissionsList = function(examIdx) {
  const targetWrap = document.getElementById(`sub-list-${examIdx}`);
  if(!targetWrap) return;

  if (targetWrap.classList.contains('open')) {
    targetWrap.classList.remove('open');
    targetWrap.innerHTML = '';
    return;
  }

  targetWrap.classList.add('open');
  const ex = examsList[examIdx];
  
  if(!ex.submissions || ex.submissions.length === 0) {
    targetWrap.innerHTML = `<div style="padding:10px 4px; font-size:12.5px; color:var(--pencil); text-align:center;">এখন পর্যন্ত কেউ পরীক্ষা দেয়নি।</div>`;
    return;
  }

  // Sorting descending leaderboard rank standard rules
  const sorted = [...ex.submissions].sort((a,b) => b.score - a.score);

  let rowsHTML = '';
  sorted.forEach((sub, rank) => {
    const isTop = rank === 0 ? 'rank1' : '';
    rowsHTML += `
      <tr>
        <td class="${isTop}">#${rank+1}</td>
        <td><b>${sub.studentName}</b> <div style="font-size:10px; color:var(--pencil);">রোল: ${sub.studentRoll}</div></td>
        <td style="font-family:var(--font-mono); font-weight:700; text-align:end;">${sub.score}</td>
        <td style="font-size:11px; color:var(--pencil); text-align:end;">${sub.correctCount}✔️ / ${sub.wrongCount}❌</td>
      </tr>
    `;
  });

  targetWrap.innerHTML = `
    <div style="padding-top:10px; margin-top:10px; border-top:1px dashed var(--rule);">
      <h4 style="margin:0 0 8px 0; font-size:13px; font-weight:700; color:var(--ink);">অংশগ্রহণকারী ও মেরিট লিস্ট:</h4>
      <table class="results" style="font-size:13px;">
        <thead>
          <tr><th style="width:40px;">র‍্যাংক</th><th>পরীক্ষার্থী</th><th style="text-align:end;">স্কোর</th><th style="text-align:end;">সঠিক/ভুল</th></tr>
        </thead>
        <tbody>
          ${rowsHTML}
        </tbody>
      </table>
    </div>
  `;
};
