<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>পরীক্ষার খাতা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F6FB; --paper-edge:#E7EEF6; --rule:#C9D8E8; --margin-red:#BF3A2C;
    --ink:#1F2A44; --pencil:#5B6472; --gold:#D9A441; --green:#2F7D5A; --red:#BF3A2C;
    --card-shadow: 0 2px 0 rgba(31,42,68,0.06), 0 8px 24px -12px rgba(31,42,68,0.18);
    --font-display:'Kalam', cursive; --font-body:'Noto Sans Bengali','Inter',sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body); color:var(--ink);
    background: repeating-linear-gradient(var(--paper) 0px, var(--paper) 31px, var(--rule) 32px), var(--paper);
    min-height:100vh; position:relative; padding:0 0 40px 0;
  }
  body::before{ content:""; position:fixed; top:0; bottom:0; left:44px; width:2px; background:var(--margin-red); opacity:0.55; z-index:0; }
  .holes{ position:fixed; left:14px; top:0; bottom:0; display:flex; flex-direction:column; justify-content:space-evenly; z-index:0; pointer-events:none; }
  .holes span{ width:12px;height:12px;border-radius:50%; background:var(--paper-edge); box-shadow: inset 0 1px 3px rgba(31,42,68,0.25); }
  .wrap{ position:relative; z-index:1; max-width:640px; margin:0 auto; padding:28px 20px 20px 64px; }
  header.top{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
  .logo{ font-family:var(--font-display); font-weight:700; font-size:30px; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .logo .dot{ color:var(--margin-red); }
  .tagline{ font-size:13px; color:var(--pencil); }
  .card{ background:#fff; border-radius:10px; box-shadow:var(--card-shadow); padding:22px; margin-bottom:18px; border:1px solid var(--paper-edge); }
  h1,h2,h3{ font-family:var(--font-display); margin:0 0 12px 0; color:var(--ink); font-weight:700; }
  h1{font-size:26px;} h2{font-size:21px;} h3{font-size:17px;}
  p.hint{ color:var(--pencil); font-size:13.5px; margin:0 0 14px 0; line-height:1.5; }
  label.field-label{ display:block; font-size:13px; color:var(--pencil); margin-bottom:6px; font-weight:600; }
  input[type=text], input[type=number], input[type=password], input[type=tel], select, textarea{
    width:100%; padding:11px 12px; border-radius:7px; border:1.5px solid var(--rule); background:#FBFDFF;
    font-family:var(--font-body); font-size:15px; color:var(--ink); margin-bottom:14px; outline:none;
  }
  textarea{ font-family:var(--font-mono); font-size:13px; min-height:160px; resize:vertical; }
  input:focus, textarea:focus, select:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(217,164,65,0.18); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; font-family:var(--font-body); font-weight:600; font-size:14.5px;
    padding:12px 18px; border-radius:8px; border:none; cursor:pointer; transition:transform .08s ease, box-shadow .08s ease; }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--ink); color:#fff; }
  .btn-primary:hover{ box-shadow:0 4px 14px -4px rgba(31,42,68,0.5); }
  .btn-gold{ background:var(--gold); color:#3a2a06; }
  .btn-outline{ background:transparent; color:var(--ink); border:1.5px solid var(--rule); }
  .btn-danger{ background:transparent; color:var(--red); border:1.5px solid rgba(191,58,44,0.35); }
  .btn-block{ width:100%; }
  .btn[disabled]{ opacity:0.5; cursor:not-allowed; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; }
  .row > *{ flex:1; }
  .exam-item{ border:1px solid var(--paper-edge); border-radius:9px; padding:14px 16px; margin-bottom:12px; background:#FCFDFE; }
  .exam-item .row-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .exam-item .code-chip{ font-family:var(--font-mono); background:var(--ink); color:#fff; padding:4px 9px; border-radius:6px; font-size:13px; letter-spacing:1px; }
  .meta{ color:var(--pencil); font-size:12.5px; margin-top:4px; }
  .q-block{ padding:16px 0; border-bottom:1px dashed var(--rule); }
  .q-block:last-child{ border-bottom:none; }
  .q-num{ display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; border:2px solid var(--margin-red);
    color:var(--margin-red); font-family:var(--font-mono); font-weight:700; font-size:13px; margin-inline-end:8px; }
  .q-tag{ font-family:var(--font-mono); font-size:11px; color:var(--pencil); background:#EEF3F8; padding:2px 7px; border-radius:5px; }
  .q-text{ font-weight:600; font-size:15.5px; margin-bottom:12px; }
  .bubble-opt{ display:flex; align-items:center; gap:10px; padding:9px 6px; border-radius:7px; cursor:pointer; }
  .bubble-opt:hover{ background:#F5F9FE; }
  .bubble-opt.locked{ opacity:0.65; cursor:default; }
  .bubble-opt.locked:hover{ background:none; }
  .bubble{ width:24px; height:24px; min-width:24px; border-radius:50%; border:2px solid var(--pencil); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-size:11px; color:var(--pencil); font-weight:700; transition: all .12s ease; }
  input[type=radio]{ display:none; }
  input[type=radio]:checked + .bubble{ background:var(--ink); border-color:var(--ink); color:#fff; }
  .opt-text{ font-size:14.5px; color:var(--ink); }
  .opt-input{ flex:1; padding:8px 10px; border-radius:6px; border:1.5px solid var(--rule); font-family:var(--font-body); font-size:14px; margin-bottom:0; }
  .timer-chip{ position:sticky; top:10px; z-index:5; display:inline-flex; align-items:center; gap:8px; background:var(--ink); color:#fff;
    font-family:var(--font-mono); font-weight:700; font-size:15px; padding:8px 14px; border-radius:20px; box-shadow:0 4px 14px -4px rgba(31,42,68,0.5); float:right; }
  .timer-chip.low{ background:var(--red); }
  .timer-dot{ width:8px; height:8px; border-radius:50%; background:var(--gold); animation:pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }
  table.results{ width:100%; border-collapse:collapse; font-size:14px; }
  table.results th{ text-align:start; color:var(--pencil); font-weight:600; padding:8px 6px; border-bottom:2px solid var(--rule); font-size:12.5px; }
  table.results td{ padding:9px 6px; border-bottom:1px dashed var(--rule); }
  .rank1{ color:var(--gold); font-weight:700; }
  .score-big{ font-family:var(--font-mono); font-weight:700; }
  .score-pass{ color:var(--green); }
  .score-fail{ color:var(--red); }
  a.link-back{ color:var(--pencil); font-size:13.5px; cursor:pointer; text-decoration:underline; }
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:20px;
    font-size:13.5px; box-shadow:0 6px 20px -6px rgba(0,0,0,0.4); z-index:50; opacity:0; transition:opacity .25s ease; }
  .toast.show{ opacity:1; }
  .stamp{ display:inline-block; border:3px solid var(--green); color:var(--green); border-radius:50%; padding:14px 18px;
    font-family:var(--font-display); font-weight:700; font-size:22px; transform:rotate(-8deg); }
  .stamp.fail{ border-color:var(--red); color:var(--red); }
  .center{ text-align:center; }
  .empty-state{ text-align:center; padding:30px 10px; color:var(--pencil); }
  .credit{ text-align:center; font-size:11.5px; color:var(--pencil); opacity:0.85; margin-top:6px; letter-spacing:0.2px; }
  .brand-logo{ width:34px; height:34px; border-radius:8px; object-fit:cover; margin-inline-end:4px; vertical-align:middle; box-shadow:0 2px 6px -2px rgba(31,42,68,0.4); }
  .info-btn{ background:none; border:none; font-size:13px; color:var(--pencil); cursor:pointer; opacity:0.8; padding:4px 8px; display:inline-flex; align-items:center; gap:4px; border:1px solid var(--rule); border-radius:14px; }
  .info-btn:hover{ opacity:1; border-color:var(--gold); }
  .info-label{ font-family:var(--font-body); font-size:11.5px; font-weight:600; }
  .about-overlay{ position:fixed; inset:0; background:rgba(15,20,32,0.55); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; }
  .about-card{ background:#fff; border-radius:14px; padding:26px 24px; max-width:340px; width:100%; text-align:center; box-shadow:0 20px 60px -20px rgba(0,0,0,0.5); }
  .about-logo{ width:88px; height:88px; border-radius:50%; object-fit:cover; box-shadow:0 4px 14px -4px rgba(31,42,68,0.4); border:3px solid var(--gold); }
  .check-seq{ padding:30px 6px; text-align:center; }
  .check-line{ display:flex; align-items:center; gap:10px; justify-content:center; padding:9px 0; font-family:var(--font-mono); font-size:14px; color:var(--pencil); opacity:0; transition:opacity .3s ease; }
  .check-line.show{ opacity:1; }
  .check-line .tick{ color:var(--green); font-weight:700; }
  .qprog{ font-family:var(--font-mono); font-size:12.5px; color:var(--pencil); margin-bottom:6px; }
  .review-block{ padding:12px 0; border-bottom:1px dashed var(--rule); }
  .review-block:last-child{ border-bottom:none; }
  .review-ans{ font-size:13.5px; margin-top:4px; }
  .review-ans.right{ color:var(--green); }
  .review-ans.wrong{ color:var(--red); }
  .detail-wrap{ display:none; margin-top:10px; padding-top:10px; border-top:1px dashed var(--rule); }
  .detail-wrap.open{ display:block; }
  ::selection{ background:rgba(217,164,65,0.35); }
  @media (max-width:480px){ .wrap{ padding:20px 14px 20px 50px; } body::before{ left:34px; } .holes{ left:10px; } }
</style>
</head>

function toast(msg){ toastEl.textContent = msg; toastEl.classList.add('show'); setTimeout(()=>toastEl.classList.remove('show'), 1800); }

async function sget(key) {
  if (key.startsWith('exam:')) {
    const code = key.split(':')[1];
    try {
      let r = await fetch(`${SCRIPT_URL}?action=getExam&code=${code}`);
      let text = await r.text();
      if(text.trim().startsWith('<!DOCTYPE') || text.trim().startsWith('<html')) {
         alert("গুগল স্ক্রিপ্ট সমস্যা: স্ক্রিপ্টটি সঠিকভাবে ডেপ্লয় করা হয়নি অথবা 'Anyone' অ্যাক্সেস দেওয়া হয়নি।");
         return null;
      }
      let json = JSON.parse(text);
      if (json.status === "success") {
        localStorage.setItem(key, JSON.stringify(json.data));
        return { value: JSON.stringify(json.data) };
      }
    } catch(e) {
      alert("নেটওয়ার্ক বা গুগলের সমস্যা: " + e.message);
    }
  }
  const r = localStorage.getItem(key);
  return r ? { value: r } : null;
}

async function sset(key, value) {
  localStorage.setItem(key, value);
  try {
    if (key.startsWith('exam:')) {
      const code = key.split(':')[1];
      const r = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight; Apps Script just reads raw body
        body: JSON.stringify({ action: 'saveExam', code, exam: value })
      });
      const text = await r.text();
      let json;
      try { json = JSON.parse(text); } catch(parseErr){
        console.error('saveExam: non-JSON response', text);
        toast('সেভ ব্যর্থ: সার্ভার থেকে ভুল উত্তর এসেছে');
        return null;
      }
      if(json.status !== 'success'){
        console.error('saveExam failed', json);
        toast('সেভ ব্যর্থ: ' + (json.message || 'অজানা সমস্যা'));
        return null;
      }
    } else if (key.startsWith('result:')) {
      const parts = key.split(':');
      const code = parts[1];
      const slug = parts[2];
      const r = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'submitResult', code, slug, result: value })
      });
      const text = await r.text();
      let json;
      try { json = JSON.parse(text); } catch(parseErr){
        console.error('submitResult: non-JSON response', text);
        toast('জমা ব্যর্থ: সার্ভার থেকে ভুল উত্তর এসেছে');
        return null;
      }

        toast('জমা ব্যর্থ: ' + (json.message || 'অজানা সমস্যা'));
        return null;
      }
    }
    return true;
  } catch(e) {
    console.error('sset network error', e);

}

async function sdel(key){ localStorage.removeItem(key); return true; }
async function slist(prefix){
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k.startsWith(prefix)) keys.push(k);
  }
  return keys;
}

function genCode(){ const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let c=''; for(let i=0;i<5;i++) c += chars[Math.floor(Math.random()*chars.length)]; return c; }
function slugify(name){ return name.trim().toLowerCase().replace(/[^a-z0-9\u0980-\u09FF]+/g,'_').slice(0,40) || 'student'; }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function linkifyText(s){
  const escaped = escapeHtml(s);
  return escaped.replace(/(https?:\/\/[^\s<]+)/g, url => `<a href="${url}" target="_blank" rel="noopener" style="color:var(--margin-red); text-decoration:underline;">${url}</a>`);
}
async function postToScript(action, params){
  try{
    const r = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight; Apps Script reads raw body
      body: JSON.stringify({ action, ...params })
    });
    const text = await r.text();
    let json;
    try{ json = JSON.parse(text); } catch(parseErr){
      console.error(action+': non-JSON response', text);
      toast('সেভ ব্যর্থ: সার্ভার থেকে ভুল উত্তর এসেছে');
      return null;
    }
    if(json.status !== 'success'){
      console.error(action+' failed', json);
      toast('ব্যর্থ: ' + (json.message || 'অজানা সমস্যা'));
      return null;
    }
    return json;
  } catch(e){
    console.error(action+' network error', e);
    toast('নেটওয়ার্ক সমস্যা: আবার চেষ্টা করো');
    return null;
  }
}

window.importBulk = function(){
  const raw = document.getElementById('bulkText').value;
  if(!raw.trim()){ toast('আগে টেক্সট পেস্ট করো'); return; }
  const blocks = raw.split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean);
  const parsed = [];
  const letterMap = {'A':0,'B':1,'C':2,'D':3,'ক':0,'খ':1,'গ':2,'ঘ':3,'a':0,'b':1,'c':2,'d':3};
  for(const block of blocks){
    const lines = block.split('\n').map(l=>l.trim()).filter(Boolean);
    let qtext='', tag='', options=['','','',''], correct=0;
    for(const line of lines){
      const qm = line.match(/^Q[:.]?\s*(.*)$/i);
      const om = line.match(/^([A-Dকখগঘ])[).]\s*(.*)$/i);
      const am = line.match(/^ANS[:.]?\s*([A-Dকখগঘ])/i);
      if(qm){
        let t = qm[1];
        const tagm = t.match(/\[([^\]]+)\]\s*$/);
        if(tagm){ tag = tagm[1]; t = t.replace(/\s*\[[^\]]+\]\s*$/,'').trim(); }
        qtext = t;
      } else if(om){
        const realIdx = (om[1] in letterMap) ? letterMap[om[1]] : letterMap[om[1].toUpperCase()];
        options[realIdx] = om[2].trim();
      } else if(am){
        correct = (am[1] in letterMap) ? letterMap[am[1]] : letterMap[am[1].toUpperCase()];
      }
    }
    if(qtext && options.every(o=>o)){
      parsed.push({ text: qtext, tag, options, correct });
    }
  }
  if(parsed.length === 0){ toast('ফরম্যাট মেলেনি'); return; }
  draftQuestions = parsed;
  renderQList();
  toast(parsed.length + 'টি প্রশ্ন ইম্পোর্ট হয়েছে');
  document.getElementById('bulkText').value = '';
}

async function saveExam(){
  const title = document.getElementById('examTitle').value.trim();
  const subject = document.getElementById('examSubject').value.trim();
  const timerMode = document.getElementById('timerMode').value;
  const duration = parseInt(document.getElementById('examDuration').value, 10) || 7;
  const perQuestionSeconds = parseInt(document.getElementById('perQSeconds').value, 10) || 36;
  const isPublic = document.getElementById('isPublic').checked;
  if(!title || !subject){ toast('নাম ও বিষয় পূরণ করো'); return; }
  for(const q of draftQuestions){
    if(!q.text.trim() || q.options.some(o=>!o.trim())){ toast('সব পূরণ করো'); return; }
  }
  let code = genCode();
  const teacherId = currentTeacher ? currentTeacher.id : 'admin';
  const exam = { code, title, subject, timerMode, duration, perQuestionSeconds, isPublic, teacherId, questions: draftQuestions, createdAt: Date.now() };
  toast('গুগল শিটে সেভ হচ্ছে...');
  const res = await sset('exam:'+code, JSON.stringify(exam));
  if(!res){ return; } // sset already showed a toast explaining what went wrong; keep draftQuestions so nothing is lost
  draftQuestions = [];
  alert('পরীক্ষা তৈরি হয়েছে এবং গুগল শিটে সেভ হয়েছে! কোড: '+code + (isPublic ? '\n\nএটা "প্র্যাকটিস করো" সেকশনে সবার জন্য উন্মুক্ত থাকবে।' : ''));
  go('teacherDashboard');
}

async function renderTeacherResults(code){
  app.innerHTML = `${header('রেজাল্ট')}<div class="card center">গুগল শিট থেকে রেজাল্ট লোড হচ্ছে...</div>`;
  const examRaw = await sget('exam:'+code);
  if(!examRaw){ app.innerHTML = `${header()}<div class="card center">পরীক্ষা পাওয়া যায়নি।</div>`; return; }
  const exam = JSON.parse(examRaw.value);

  const rawResults = await getRemoteResults(code);
  // group multiple practice attempts per student into one row (student can attempt unlimited times)
  const groups = {};
  rawResults.forEach(r=>{
    const key = r.slug || slugify(r.studentName||'');
    if(!groups[key]) groups[key] = [];
    groups[key].push(r);
  });
  const grouped = Object.values(groups).map(list=>{
    list.sort((a,b)=> b.submittedAt - a.submittedAt);
    const best = list.reduce((m,r)=> (r.score > m.score ? r : m), list[0]);
    return { studentName: list[0].studentName, attempts: list, best, count: list.length };
  });
  grouped.sort((a,b)=> b.best.score - a.best.score || a.best.submittedAt - b.best.submittedAt);
  window.__lastGrouped = grouped;
  window.__lastExam = exam;

  let rows = grouped.map((g,i)=>{
    const pct = Math.round((g.best.score/g.best.total)*100);
    return `<tr>
      <td class="${i===0?'rank1':''}">${i+1}</td>
      <td>${escapeHtml(g.studentName)}${g.count>1?` <span class="q-tag">${g.count}বার চেষ্টা</span>`:''}</td>
      <td class="score-big ${pct>=50?'score-pass':'score-fail'}">${g.best.score}/${g.best.total}</td>
      <td>${pct}%</td>
      <td>${new Date(g.best.submittedAt).toLocaleTimeString('bn-BD')}</td>
      <td><a class="link-back" onclick="toggleDetail(${i})">খাতা দেখো</a></td>
    </tr>
    <tr><td colspan="6" style="border-bottom:none; padding:0;"><div class="detail-wrap" id="detail${i}"></div></td></tr>`;
  }).join('');

  app.innerHTML = `
    ${header('রেজাল্ট')}
    <div class="card">
      <h2>${escapeHtml(exam.title)}</h2>
      <p class="hint">কোড: <span class="code-chip">${exam.code}</span> · মোট স্টুডেন্ট: ${grouped.length} · মোট জমা (সব attempt মিলিয়ে): ${rawResults.length}</p>
      <p class="hint">এখানে প্রতিটা স্টুডেন্টের সবচেয়ে ভালো স্কোরটা দেখানো হচ্ছে (একাধিকবার practice করলেও)।</p>
      ${grouped.length===0 ? `<div class="empty-state">এখনো কেউ পরীক্ষা দেয়নি বা লোড হতে পারছে না।</div>` : `
      <table class="results">
        <thead><tr><th>#</th><th>নাম</th><th>সেরা স্কোর</th><th>%</th><th>সময়</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`}
    </div>
    <div class="center"><a class="link-back" onclick="go('teacherDashboard')">← ফিরে যাও</a></div>
    ${creditFooter()}
  `;
}

window.toggleDetail = function(i){
  const el = document.getElementById('detail'+i);
  const grouped = window.__lastGrouped, exam = window.__lastExam;
  if(!el || !grouped || !exam) return;
  if(el.classList.contains('open')){ el.classList.remove('open'); el.innerHTML=''; return; }
  el.classList.add('open');
  renderAttemptList(i);
}
function renderAttemptList(i){
  const el = document.getElementById('detail'+i);
  const g = window.__lastGrouped[i];
  const sortedAsc = [...g.attempts].sort((a,b)=> a.submittedAt - b.submittedAt);
  g.__sortedAsc = sortedAsc;
  const listHtml = [...sortedAsc].reverse().map((r,idxRev)=>{
    const tryNo = sortedAsc.length - idxRev;
    const pct = Math.round((r.score/r.total)*100);
    return `<div class="review-block" style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
      <div>চেষ্টা ${tryNo} · <span class="score-big ${pct>=50?'score-pass':'score-fail'}">${r.score}/${r.total}</span><br><span class="meta">${new Date(r.submittedAt).toLocaleString('bn-BD')}</span></div>
      <a class="link-back" onclick="showTeacherAttempt(${i},${tryNo})">খাতা দেখো</a>
    </div>`;
  }).join('');
  el.innerHTML = `<div style="padding-top:8px;">${listHtml}</div>`;
}
window.showTeacherAttempt = function(i, tryNo){
  const el = document.getElementById('detail'+i);
  const g = window.__lastGrouped[i];
  const exam = window.__lastExam;
  const r = g.__sortedAsc[tryNo-1];
  el.innerHTML = `<div style="padding-top:8px;">
    <a class="link-back" onclick="renderAttemptList(${i})">← সব চেষ্টার তালিকায় ফিরে যাও</a>
    <div style="margin-top:10px;">${buildAnswerReview(exam, r.answers||[])}</div>

}

async function verifyStudentLogin(){
  const name = document.getElementById('studName').value.trim();
  const code = document.getElementById('studCode').value.trim().toUpperCase();
  const pass = document.getElementById('studPass').value.trim();
  if(!name || !code || !pass){ toast('সবগুলো পূরণ করো'); return; }
  if(pass !== STUDENT_PASSWORD){ toast('পাসওয়ার্ড ভুল হয়েছে'); return; }

  toast('গুগল শিট থেকে পরীক্ষা খোঁজা হচ্ছে...');
  const examRaw = await sget('exam:'+code);
  if(!examRaw){ alert('পরীক্ষা পাওয়া যায়নি! কোডটি সঠিক কিনা যাচাই করো বা একটি নতুন এক্সাম তৈরি করে ট্রাই করো।'); return; }

  const exam = JSON.parse(examRaw.value);
  const slug = slugify(name);

  const existingResults = await getRemoteResults(code);
  const myAttempts = existingResults.filter(r => (r.slug ? r.slug === slug : slugify(r.studentName||'') === slug));
  if(myAttempts.length > 0){
    myAttempts.sort((a,b)=> b.submittedAt - a.submittedAt);
    go('studentChoice', { exam, slug, name, attempts: myAttempts });
    return;
  }

  runCheckingSequence(exam, slug, name, 1);
}

window.viewAttemptDetail = function(tryNo){
  const { exam, sortedAsc } = window.__choiceCtx;
  const attempt = sortedAsc[tryNo - 1];
  go('studentAlready', { exam, prev: attempt, tryNo, totalTries: sortedAsc.length });
}
window.startPracticeAttempt = function(){
  const { exam, slug, name, attempts } = window.__choiceCtx;
  runCheckingSequence(exam, slug, name, attempts.length + 1);
}

function runCheckingSequence(exam, slug, name, attemptNumber){
  app.innerHTML = `
    ${header('যাচাই হচ্ছে')}
    <div class="card check-seq">
      <div id="cLine0" class="check-line">গুগল ডাটাবেজ কানেক্ট করা হচ্ছে...</div>
      <div id="cLine1" class="check-line"><span class="tick">✓</span> নাম নিবন্ধন সম্পন্ন</div>
      <div id="cLine2" class="check-line"><span class="tick">✓</span> পরীক্ষা শুরু করার জন্য প্রস্তুত</div>
    </div>
    ${creditFooter()}
  `;
  setTimeout(()=> document.getElementById('cLine0').classList.add('show'), 150);
  setTimeout(()=> document.getElementById('cLine1').classList.add('show'), 600);
  setTimeout(()=> document.getElementById('cLine2').classList.add('show'), 1100);
  setTimeout(async ()=>{
    go('studentExam', {
      exam, slug, name, attemptNumber: attemptNumber || 1,
      answers: new Array(exam.questions.length).fill(null),
      locked: new Array(exam.questions.length).fill(false),
      startedAt: Date.now(),
      qIndex: 0
    });
  }, 1600);
}

function renderStudentExam(){
  if(state.exam.timerMode === 'total') renderStudentExamTotal();
  else renderStudentExamPerQ();
}

function renderStudentExamTotal(){
  const { exam, answers, locked } = state;
  const totalSec = exam.duration*60;
  const qHtml = exam.questions.map((q,i)=> `
    <div class="q-block">
      <div style="display:flex; align-items:flex-start; gap:2px;">
        <span class="q-num">${i+1}</span>
        <div style="margin-inline-start:4px;">
          <div class="q-text">${escapeHtml(q.text)}</div>
          ${q.tag ? `<span class="q-tag">${escapeHtml(q.tag)}</span>`:''}
        </div>
      </div>
      ${q.options.map((opt,j)=> `
        <label class="bubble-opt ${locked[i]?'locked':''}">
          <input type="radio" name="ans${i}" ${answers[i]===j?'checked':''} ${locked[i]?'disabled':''} onchange="setAnswerTotal(${i},${j})">
          <div class="bubble">${['ক','খ','গ','ঘ'][j]}</div>
          <div class="opt-text">${escapeHtml(opt)}</div>
        </label>
      `).join('')}
    </div>
  `).join('');

  app.innerHTML = `
    <div>
      <div class="timer-chip" id="timerChip"><span class="timer-dot"></span><span id="timerText">${fmtTime(totalSec)}</span></div>
      <header class="top" style="margin-bottom:8px;"><div class="logo" style="font-size:22px;">${escapeHtml(exam.title)}</div></header>
    </div>
    <div class="card">${qHtml}</div>
    <button class="btn btn-primary btn-block" onclick="submitExam(false)">✅ খাতা জমা দাও</button>
    ${creditFooter()}
  `;

  let remaining = totalSec - Math.floor((Date.now()-state.startedAt)/1000);
  if(remaining < 0) remaining = 0;
  updateTimerDisplay(remaining);
  timerInterval = setInterval(()=>{
    remaining -= 1;
    updateTimerDisplay(remaining);
    if(remaining <= 0){
      clearInterval(timerInterval); timerInterval = null;
      submitExam(true);
    }
  }, 1000);
}
window.setAnswerTotal = function(qi, oi){
  state.answers[qi] = oi;
  state.locked[qi] = true;
  renderStudentExamTotal();
}

  app.innerHTML = `

      <header class="top" style="margin-bottom:8px;"><div class="logo" style="font-size:22px;">${escapeHtml(exam.title)}</div></header>

    <div class="qprog">প্রশ্ন ${qIndex+1} / ${exam.questions.length}</div>
    <div class="card">

        <div style="display:flex; align-items:flex-start; gap:2px;">
          <span class="q-num">${qIndex+1}</span>
          <div style="margin-inline-start:4px;">
            <div class="q-text">${escapeHtml(q.text)}</div>
            ${q.tag ? `<span class="q-tag">${escapeHtml(q.tag)}</span>`:''}
          </div>
        </div>
        ${q.options.map((opt,j)=> `
          <label class="bubble-opt ${answered?'locked':''}">
            <input type="radio" name="ansq" ${answers[qIndex]===j?'checked':''} ${answered?'disabled':''} onchange="setAnswerPerQ(${j})">
            <div class="bubble">${['ক','খ','গ','ঘ'][j]}</div>
            <div class="opt-text">${escapeHtml(opt)}</div>
          </label>
        `).join('')}
      </div>
    </div>
    ${creditFooter()}
  `;

  let remaining = secPerQ;
  updateTimerDisplay(remaining);
  timerInterval = setInterval(()=>{

window.setAnswerPerQ = function(oi){
  if(timerInterval){ clearInterval(timerInterval); timerInterval = null; }
  state.answers[state.qIndex] = oi;
  setTimeout(()=> advanceQuestion(), 450);
}
function advanceQuestion(){
  if(state.qIndex >= state.exam.questions.length - 1){
    submitExam(false);

  }
}

function buildAnswerReview(exam, answers){
  return exam.questions.map((q,qi)=>{
    const given = answers[qi];
    const correct = q.correct;
    const isRight = given === correct;
    const givenLabel = (given===null||given===undefined) ? 'উত্তর দেওনি' : `${['ক','খ','গ','ঘ'][given]}) ${escapeHtml(q.options[given])}`;
    const correctLabel = `${['ক','খ','গ','ঘ'][correct]}) ${escapeHtml(q.options[correct])}`;
    return `<div class="review-block">
      <div class="q-text" style="font-size:14px;">${qi+1}. ${escapeHtml(q.text)}</div>
      <div class="review-ans ${isRight?'right':'wrong'}">তুমি দিয়েছিলে: ${givenLabel} ${isRight?'✓':'✗'}</div>
      ${!isRight ? `<div class="review-ans right">সঠিক উত্তর: ${correctLabel}</div>` : ''}
    </div>`;
  }).join('');
}

window.importTopicsBulk = async function(subject, sectionKey, maxCount){
  const raw = document.getElementById('topicBulkText').value;
  if(!raw.trim()){ toast('আগে টেক্সট পেস্ট করো'); return; }
  const blocks = raw.split(/\n(?=##\s)/).map(b=>b.trim()).filter(Boolean);
  const parsed = [];
  for(const block of blocks){
    const lines = block.split('\n');
    const headerLine = lines[0].replace(/^##\s*/, '').trim();
    const content = lines.slice(1).join('\n').trim();
    if(headerLine) parsed.push({ name: headerLine, content });
  }
  if(parsed.length === 0){ toast('কোনো অধ্যায় পার্স করা যায়নি, ফরম্যাট চেক করো'); return; }
  const toSave = parsed.slice(0, maxCount);
  toast(`${toSave.length}টা অধ্যায় সেভ হচ্ছে...`);
  for(let i=0;i<toSave.length;i++){
    const key = `${subject}_${sectionKey}_${i+1}`;
    await saveTopicRemote(key, toSave[i].name, toSave[i].content);
  }
  toast(`${toSave.length}টা অধ্যায় সেভ হয়েছে ✅`);
  go('topicsManageChapters', { subject, sectionKey });
}

// ---- Mini calendar builder ----
function buildMiniCalendar(year, month, records, onDayClickFn, navTargetScreen, navCtx){
  const statusByDate = {};
  records.forEach(r=> statusByDate[r.date] = r.status);
  const first = new Date(year, month, 1);
  const startWeekday = first.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayS = todayStr();

  let cells = '';
  for(let i=0;i<startWeekday;i++){ cells += `<div></div>`; }
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const status = statusByDate[dateStr];
    let bg = '#F5F9FE', color = 'var(--ink)', border = '1px solid var(--rule)';
    if(status === 'approved'){ bg = 'var(--green)'; color = '#fff'; border = 'none'; }
    else if(status === 'pending'){ bg = 'var(--gold)'; color = '#3a2a06'; border = 'none'; }
    const isToday = dateStr === todayS;
    const clickable = onDayClickFn ? `onclick="${onDayClickFn}('${dateStr}')" style="cursor:pointer;` : `style="cursor:default;`;
    cells += `<div ${clickable} background:${bg}; color:${color}; border:${border}; ${isToday?'outline:2px solid var(--margin-red);':''} border-radius:7px; display:flex; align-items:center; justify-content:center; height:34px; font-size:13px; font-family:var(--font-mono);">${d}</div>`;
  }

  const prevM = month===0 ? 11 : month-1;
  const prevY = month===0 ? year-1 : year;
  const nextM = month===11 ? 0 : month+1;
  const nextY = month===11 ? year+1 : year;

  return `
    <div class="card" style="padding:16px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <a class="link-back" onclick='goCalNav(${prevY},${prevM},"${navTargetScreen}",${JSON.stringify(navCtx)})'>‹</a>

}
async function renderFAQView(id){
  const items = window.__faqItemsStudent && window.__faqItemsStudent.length ? window.__faqItemsStudent : await getAllFAQCombined();
  const it = items.find(x=> x.id === id);
  if(!it){ app.innerHTML = `${header()}<div class="card center">পাওয়া যায়নি।</div>`; return; }
  app.innerHTML = `
    ${header('সাধারণ জিজ্ঞাসা')}
    <div class="card">
      <h2>${escapeHtml(it.question)}</h2>
      <div style="white-space:pre-wrap; font-size:15px; line-height:1.7;">${linkifyText(it.answer)}</div>
    </div>
    <div class="center"><a class="link-back" onclick="go('faqList')">← তালিকায় ফিরে যাও</a></div>
    ${creditFooter()}
  `;
}

function render(){
  const s = state.screen;
  if(s==='landing') renderLanding();
  else if(s==='teacherGate') renderTeacherGate();
  else if(s==='teacherDashboard') renderTeacherDashboard();
  else if(s==='teacherNewExam') renderTeacherNewExam();
  else if(s==='teacherResults') renderTeacherResults(state.code);
  else if(s==='studentEntry') renderStudentEntry();
  else if(s==='practiceList') renderPracticeList();
  else if(s==='practiceEntry') renderPracticeEntry(state.exam);
  else if(s==='studentChoice') renderStudentChoice(state.exam, state.slug, state.name, state.attempts);
  else if(s==='studentAlready') renderStudentAlready(state.exam, state.prev, state.tryNo, state.totalTries);
  else if(s==='studentExam') renderStudentExam();
  else if(s==='studentResult') renderStudentResult();
  else if(s==='topicsManage') renderTopicsManage();
  else if(s==='topicsManageSection') renderTopicsManageSection(state.subject);
  else if(s==='topicsManageChapters') renderTopicsManageChapters(state.subject, state.sectionKey);
  else if(s==='topicsEdit') renderTopicsEdit(state.subject, state.sectionKey, state.chNum, state.existingName, state.existingContent);
  else if(s==='topicsSubject') renderTopicsSubject();
  else if(s==='topicsSection') renderTopicsSection(state.subject);
  else if(s==='topicsChapterList') renderTopicsChapterList(state.subject, state.sectionKey);
  else if(s==='topicsView') renderTopicsView(state.chapName, state.content, state.subject, state.sectionKey);
  else if(s==='attendanceDashboard') renderAttendanceDashboard();
  else if(s==='attendanceMark') renderAttendanceMark(state.slug, state.studentName);
  else if(s==='attendanceStudentEntry') renderAttendanceStudentEntry();
  else if(s==='attendanceStudentView') renderAttendanceStudentView(state.slug, state.name, state.records);
  else if(s==='faqManage') renderFAQManage();
  else if(s==='faqEdit') renderFAQEdit(state.id);
  else if(s==='faqList') renderFAQList();
  else if(s==='faqView') renderFAQView(state.id);
}

render();
</script>
</body>
</html>
