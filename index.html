<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>পরীক্ষার খাতা — Teacher, Student & Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Noto+Sans+Bengali:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F6FB; --paper-edge:#E7EEF6; --rule:#C9D8E8; --margin-red:#BF3A2C;
    --ink:#1F2A44; --pencil:#5B6472; --gold:#D9A441; --green:#2F7D5A; --red:#BF3A2C;
    --card-shadow: 0 2px 0 rgba(31,42,68,0.06), 0 8px 24px -12px rgba(31,42,68,0.18);
    --font-display:'Kalam', cursive; --font-body:'Noto Sans Bengali','Inter',sans-serif; --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font-body); color:var(--ink);
    background: repeating-linear-gradient(var(--paper) 0px, var(--paper) 31px, var(--rule) 32px), var(--paper);
    min-height:100vh; position:relative; padding:0 0 40px 0;
  }
  body::before{ content:""; position:fixed; top:0; bottom:0; left:44px; width:2px; background:var(--margin-red); opacity:0.55; z-index:0; }
  .holes{ position:fixed; left:14px; top:0; bottom:0; display:flex; flex-direction:column; justify-content:space-evenly; z-index:0; pointer-events:none; }
  .holes span{ width:12px;height:12px;border-radius:50%; background:var(--paper-edge); box-shadow: inset 0 1px 3px rgba(31,42,68,0.25); }
  .wrap{ position:relative; z-index:1; max-width:640px; margin:0 auto; padding:28px 20px 20px 64px; }
  header.top{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:22px; flex-wrap:wrap; }
  .logo{ font-family:var(--font-display); font-weight:700; font-size:30px; color:var(--ink); display:flex; align-items:center; gap:8px; }
  .logo .dot{ color:var(--margin-red); }
  .tagline{ font-size:13px; color:var(--pencil); }
  .card{ background:#fff; border-radius:10px; box-shadow:var(--card-shadow); padding:22px; margin-bottom:18px; border:1px solid var(--paper-edge); }
  h1,h2,h3{ font-family:var(--font-display); margin:0 0 12px 0; color:var(--ink); font-weight:700; }
  h1{font-size:26px;} h2{font-size:21px;} h3{font-size:17px;}
  p.hint{ color:var(--pencil); font-size:13.5px; margin:0 0 14px 0; line-height:1.5; }
  label.field-label{ display:block; font-size:13px; color:var(--pencil); margin-bottom:6px; font-weight:600; }
  input[type=text], input[type=number], input[type=password], input[type=tel], select, textarea{
    width:100%; padding:11px 12px; border-radius:7px; border:1.5px solid var(--rule); background:#FBFDFF;
    font-family:var(--font-body); font-size:15px; color:var(--ink); margin-bottom:14px; outline:none;
  }
  textarea{ font-family:var(--font-body); font-size:14px; min-height:100px; resize:vertical; }
  input:focus, textarea:focus, select:focus{ border-color:var(--gold); box-shadow:0 0 0 3px rgba(217,164,65,0.18); }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; font-family:var(--font-body); font-weight:600; font-size:14.5px;
    padding:12px 18px; border-radius:8px; border:none; cursor:pointer; transition:transform .08s ease, box-shadow .08s ease; }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--ink); color:#fff; }
  .btn-primary:hover{ box-shadow:0 4px 14px -4px rgba(31,42,68,0.5); }
  .btn-gold{ background:var(--gold); color:#3a2a06; }
  .btn-outline{ background:transparent; color:var(--ink); border:1.5px solid var(--rule); }
  .btn-danger{ background:transparent; color:var(--red); border:1.5px solid rgba(191,58,44,0.35); }
  .btn-block{ width:100%; }
  .btn[disabled]{ opacity:0.5; cursor:not-allowed; }
  .row{ display:flex; gap:10px; flex-wrap:wrap; margin-bottom:12px; }
  .row > *{ flex:1; }
  .exam-item{ border:1px solid var(--paper-edge); border-radius:9px; padding:14px 16px; margin-bottom:12px; background:#FCFDFE; }
  .exam-item .row-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .exam-item .code-chip{ font-family:var(--font-mono); background:var(--ink); color:#fff; padding:4px 9px; border-radius:6px; font-size:13px; letter-spacing:1px; }
  .meta{ color:var(--pencil); font-size:12.5px; margin-top:4px; }
  .q-block{ padding:16px 0; border-bottom:1px dashed var(--rule); }
  .q-block:last-child{ border-bottom:none; }
  .q-num{ display:inline-flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:50%; border:2px solid var(--margin-red);
    color:var(--margin-red); font-family:var(--font-mono); font-weight:700; font-size:13px; margin-inline-end:8px; }
  .q-text{ font-weight:600; font-size:15.5px; margin-bottom:12px; }
  .bubble-opt{ display:flex; align-items:center; gap:10px; padding:9px 6px; border-radius:7px; cursor:pointer; }
  .bubble-opt:hover{ background:#F5F9FE; }
  .bubble{ width:24px; height:24px; min-width:24px; border-radius:50%; border:2px solid var(--pencil); display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-size:11px; color:var(--pencil); font-weight:700; transition: all .12s ease; }
  input[type=radio]{ display:none; }
  input[type=radio]:checked + .bubble{ background:var(--ink); border-color:var(--ink); color:#fff; }
  .opt-text{ font-size:14.5px; color:var(--ink); }
  .timer-chip{ position:sticky; top:10px; z-index:5; display:inline-flex; align-items:center; gap:8px; background:var(--ink); color:#fff;
    font-family:var(--font-mono); font-weight:700; font-size:15px; padding:8px 14px; border-radius:20px; box-shadow:0 4px 14px -4px rgba(31,42,68,0.5); float:right; }
  .timer-dot{ width:8px; height:8px; border-radius:50%; background:var(--gold); animation:pulse 1s infinite; }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.25;} }
  table.results{ width:100%; border-collapse:collapse; font-size:14px; }
  table.results th{ text-align:start; color:var(--pencil); font-weight:600; padding:8px 6px; border-bottom:2px solid var(--rule); font-size:12.5px; }
  table.results td{ padding:9px 6px; border-bottom:1px dashed var(--rule); }
  .score-big{ font-family:var(--font-mono); font-weight:700; }
  .score-pass{ color:var(--green); }
  .score-fail{ color:var(--red); }
  a.link-back{ color:var(--pencil); font-size:13.5px; cursor:pointer; text-decoration:underline; display:inline-block; margin-top:10px; }
  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:10px 18px; border-radius:20px;
    font-size:13.5px; box-shadow:0 6px 20px -6px rgba(0,0,0,0.4); z-index:50; opacity:0; transition:opacity .25s ease; pointer-events:none; }
  .toast.show{ opacity:1; }
  .stamp{ display:inline-block; border:3px solid var(--green); color:var(--green); border-radius:50%; padding:14px 18px;
    font-family:var(--font-display); font-weight:700; font-size:22px; transform:rotate(-8deg); margin: 15px 0; }
  .stamp.fail{ border-color:var(--red); color:var(--red); }
  .center{ text-align:center; }
  .credit{ text-align:center; font-size:11.5px; color:var(--pencil); opacity:0.85; margin-top:20px; letter-spacing:0.2px; }
  .tab-container { display: flex; gap: 8px; margin-bottom: 18px; border-bottom: 2px solid var(--rule); padding-bottom: 8px; }
  .tab-btn { background: none; border: none; font-family: var(--font-body); font-size: 15px; font-weight: 600; color: var(--pencil); padding: 6px 12px; cursor: pointer; border-radius: 6px; }
  .tab-btn.active { background: var(--ink); color: #fff; }
  .q-creator-block { border: 1px dashed var(--rule); padding: 12px; border-radius: 8px; margin-bottom: 12px; background: #FAF9F6; }
</style>
</head>
<body>
<div class="holes" id="holes"></div>
<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
// গুগল শিটের ওয়েব অ্যাপ লিঙ্ক (Web App URL)
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwkf6Hv4lrZm2mWfT35rUHETwMFQ8rAVsJbW56tjJdVup3I5Yse9yv-JmPQg-KqTKdw/exec";

const STATE = {
  currentTab: 'student', 
  currentView: 'dashboard', 
  exams: [
    {
      id: "EX101",
      title: "HSC পদার্থবিজ্ঞান ১ম পত্র - ভেক্টর",
      duration: 5,
      questions: [
        { q: "দুটি সমমানের ভেক্টরের লব্ধির মান তাদের প্রত্যেকের মানের সমান হলে মধ্যবর্তী কোণ কত?", o: ["0°", "60°", "120°", "180°"], a: 2 },
        { q: "নিচের কোনটি স্কেলার রাশি?", o: ["বল", "বেগ", "কাজ", "ত্বরণ"], a: 2 }
      ]
    }
  ],
  activeExam: null,
  timer: null,
  timeLeft: 0,
  userAnswers: {},
  studentResults: [] 
};

const CREATOR_CREDIT = 'তৈরি করেছে: Md. Saimon Samiu — IUT, OIC, IPE';

// Initialize Notebook Margins
const holesContainer = document.getElementById('holes');
for (let i = 0; i < 20; i++) {
  holesContainer.appendChild(document.createElement('span'));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.innerText = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// গুগল শিট থেকে অটোমেটিক লাইভ এক্সাম ডাটা লোড করার ফাংশন
function loadExamsFromSheet() {
  fetch(`${WEB_APP_URL}?action=loadExams`)
    .then(res => res.json())
    .then(data => {
      if(data && data.length > 0) {
        STATE.exams = data;
        if(STATE.currentView === 'dashboard') render();
      }
    })
    .catch(err => console.error("Error loading exams:", err));
}

// Render Control Engine
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const header = document.createElement('header');
  header.className = 'top';
  header.innerHTML = `
    <div class="logo">পরীক্ষার খাতা<span class="dot">.</span></div>
    <div class="tagline">এডমিন, শিক্ষক ও ছাত্র প্যানেল</div>
  `;
  app.appendChild(header);

  if (STATE.currentView === 'dashboard' || STATE.currentView === 'result') {
    const tabs = document.createElement('div');
    tabs.className = 'tab-container';
    tabs.innerHTML = `
      <button class="tab-btn ${STATE.currentTab === 'student' ? 'active' : ''}" onclick="switchTab('student')">👨‍🎓 ছাত্র প্যানেল</button>
      <button class="tab-btn ${STATE.currentTab === 'teacher' ? 'active' : ''}" onclick="switchTab('teacher')">👨‍🏫 শিক্ষক প্যানেল</button>
      <button class="tab-btn ${STATE.currentTab === 'admin' ? 'active' : ''}" onclick="switchTab('admin')">⚙️ এডমিন</button>
    `;
    app.appendChild(tabs);
  }

  if (STATE.currentView === 'dashboard') {
    renderDashboard(app);
  } else if (STATE.currentView === 'exam') {
    renderExamInterface(app);
  } else if (STATE.currentView === 'result') {
    renderResultView(app);
  }

  const footer = document.createElement('div');
  footer.className = 'credit';
  footer.innerText = CREATOR_CREDIT;
  app.appendChild(footer);
}

function switchTab(tab) {
  STATE.currentTab = tab;
  STATE.currentView = 'dashboard';
  render();
}

function renderDashboard(app) {
  const container = document.createElement('div');

  if (STATE.currentTab === 'student') {
    container.innerHTML = `
      <div class="card">
        <h2>উপলব্ধ টিউশন পরীক্ষা সমূহ</h2>
        <p class="hint">আপনার শিক্ষকের দেওয়া পরীক্ষায় অংশ নিতে নিচের 'পরীক্ষা দিন' বাটনে ক্লিক করুন।</p>
        <div id="exam-list"></div>
      </div>
    `;
    const list = container.querySelector('#exam-list');
    STATE.exams.forEach(exam => {
      const item = document.createElement('div');
      item.className = 'exam-item';
      item.innerHTML = `
        <div class="row-top">
          <div>
            <div class="q-text" style="margin-bottom:4px;">${exam.title}</div>
            <div class="meta">প্রশ্নসংখ্যা: ${exam.questions.length} টি | সময়: ${exam.duration} মিনিট</div>
          </div>
          <span class="code-chip">${exam.id}</span>
        </div>
        <button class="btn btn-primary btn-block" style="margin-top:12px;" onclick="startExam('${exam.id}')">✍️ পরীক্ষা দিন</button>
      `;
      list.appendChild(item);
    });
  } 
  else if (STATE.currentTab === 'teacher') {
    container.innerHTML = `
      <div class="card">
        <h2>নতুন টিউটোরিয়াল প্রশ্নপত্র তৈরি করুন</h2>
        <p class="hint">এখানে শিক্ষকরা এক্সাম সেটআপ করে সরাসরি গুগল শিটে সেভ করে রাখতে পারবেন।</p>
        
        <label class="field-label">পরীক্ষার নাম/টপিক</label>
        <input type="text" id="ex-title" placeholder="উদা: HSC রসায়ন ২য় পত্র - জৈব যৌগ">

        <div class="row">
          <div>
            <label class="field-label">পরীক্ষার কোড (Unique)</label>
            <input type="text" id="ex-id" placeholder="CHEM201">
          </div>
          <div>
            <label class="field-label">সময় (মিনিট)</label>
            <input type="number" id="ex-duration" value="10" min="1">
          </div>
        </div>

        <hr style="border:none; border-top:1px dashed var(--rule); margin:18px 0;">
        <h3>প্রশ্নসমূহ যোগ করুন</h3>
        <div id="dynamic-questions"></div>
        
        <button class="btn btn-outline btn-block" onclick="addQuestionField()" style="margin-bottom:14px;">➕ আরও একটি প্রশ্ন যোগ করুন</button>
        <button class="btn btn-gold btn-block" onclick="saveCreatedExam()">💾 সম্পূর্ণ প্রশ্নপত্রটি সেভ করুন</button>
      </div>
    `;
    app.appendChild(container);
    addQuestionField();
    return;
  } 
  else if (STATE.currentTab === 'admin') {
    let resultsHtml = '';
    if(STATE.studentResults.length === 0) {
      resultsHtml = `<tr><td colspan="4" class="center" style="color:var(--pencil);">এখনো কেউ পরীক্ষায় অংশগ্রহণ করেনি</td></tr>`;
    } else {
      STATE.studentResults.forEach(r => {
        resultsHtml += `
          <tr>
            <td><b>${r.examId}</b></td>
            <td>${r.title}</td>
            <td class="score-big ${r.score >= r.total/2 ? 'score-pass' : 'score-fail'}">${r.score}/${r.total}</td>
            <td><span class="q-tag">${r.score >= r.total/2 ? 'পাস':'ফেল'}</span></td>
          </tr>
        `;
      });
    }

    container.innerHTML = `
      <div class="card">
        <h2>সিস্টেম এডমিন ড্যাশবোর্ড</h2>
        <p class="hint">শিক্ষার্থীদের সাবমিট করা খাতার লাইভ রেজাল্ট শিট এবং গুগল শিটের কানেকশন ওভারভিউ।</p>
        <div class="row" style="margin-bottom:20px;">
          <div class="exam-item center" style="margin-bottom:0;"><div class="score-big" style="font-size:24px;">${STATE.exams.length}</div><div class="meta">মোট একটিভ এক্সাম</div></div>
          <div class="exam-item center" style="margin-bottom:0;"><div class="score-big" style="font-size:24px; color:var(--green);">${STATE.studentResults.length}</div><div class="meta">মোট খাতা জমা পড়েছে</div></div>
        </div>
        <h3>শিক্ষার্থীদের পরীক্ষার রেজাল্ট শিট</h3>
        <table class="results">
          <thead><tr><th>কোড</th><th>পরীক্ষার নাম</th><th>প্রাপ্ত নম্বর</th><th>স্ট্যাটাস</th></tr></thead>
          <tbody>${resultsHtml}</tbody>
        </table>
      </div>
    `;
  }
  app.appendChild(container);
}

let questionCounter = 0;
function addQuestionField() {
  questionCounter++;
  const container = document.getElementById('dynamic-questions');
  const qBlock = document.createElement('div');
  qBlock.className = 'q-creator-block';
  qBlock.innerHTML = `
    <label class="field-label">প্রশ্ন ${questionCounter}</label>
    <input type="text" class="q-input-text" placeholder="প্রশ্নটি লিখুন">
    <div class="row" style="margin-bottom:6px;"><input type="text" class="opt-0" placeholder="অপশন ১"><input type="text" class="opt-1" placeholder="অপশন ২"></div>
    <div class="row" style="margin-bottom:10px;"><input type="text" class="opt-2" placeholder="অপশন ৩"><input type="text" class="opt-3" placeholder="অপশন ৪"></div>
    <label class="field-label">সঠিক উত্তর</label>
    <select class="q-correct-ans"><option value="0">অপশন ১</option><option value="1">অপশন ২</option><option value="2">অপশন ৩</option><option value="3">অপশন ৪</option></select>
  `;
  container.appendChild(qBlock);
}

// টিচারের তৈরি এক্সাম সরাসরি গুগল শিটে পুশ করা
function saveCreatedExam() {
  const title = document.getElementById('ex-title').value.trim();
  const id = document.getElementById('ex-id').value.trim();
  const duration = parseInt(document.getElementById('ex-duration').value);

  if (!title || !id) { showToast('⚠️ পরীক্ষার নাম এবং সঠিক আইডি দিন!'); return; }

  const qBlocks = document.querySelectorAll('.q-creator-block');
  const questions = [];

  for (let block of qBlocks) {
    const qText = block.querySelector('.q-input-text').value.trim();
    const o0 = block.querySelector('.opt-0').value.trim();
    const o1 = block.querySelector('.opt-1').value.trim();
    const o2 = block.querySelector('.opt-2').value.trim();
    const o3 = block.querySelector('.opt-3').value.trim();
    const correct = parseInt(block.querySelector('.q-correct-ans').value);

    if (!qText || !o0 || !o1 || !o2 || !o3) { showToast('⚠️ সবগুলো ফিল্ড পূরণ করুন!'); return; }
    questions.push({ q: qText, o: [o0, o1, o2, o3], a: correct });
  }

  const newExam = { id, title, duration, questions };

  // গুগল শিটে পরীক্ষার ডাটা পাঠানো (action=saveExam)
  const saveUrl = `${WEB_APP_URL}?action=saveExam&code=${encodeURIComponent(id)}&exam=${encodeURIComponent(JSON.stringify(newExam))}`;
  
  showToast('⏳ গুগল শিটে এক্সাম আপলোড হচ্ছে...');
  fetch(saveUrl, { method: 'GET', mode: 'no-cors' })
    .then(() => {
      STATE.exams.push(newExam);
      showToast('✅ নতুন প্রশ্নপত্রটি গুগল শিটে সেভ হয়েছে!');
      questionCounter = 0;
      switchTab('student');
    })
    .catch(err => console.error(err));
}

function startExam(examId) {
  const exam = STATE.exams.find(e => e.id === examId);
  if (!exam) return;
  STATE.activeExam = exam;
  STATE.currentView = 'exam';
  STATE.timeLeft = exam.duration * 60;
  STATE.userAnswers = {};
  render();

  STATE.timer = setInterval(() => {
    STATE.timeLeft--;
    const timerChip = document.getElementById('exam-timer');
    if (timerChip) {
      const mins = Math.floor(STATE.timeLeft / 60);
      const secs = STATE.timeLeft % 60;
      timerChip.innerHTML = `<span class="timer-dot"></span> ${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }
    if (STATE.timeLeft <= 0) { submitExam(); }
  }, 1000);
}

function renderExamInterface(app) {
  const exam = STATE.activeExam;
  const mins = Math.floor(STATE.timeLeft / 60);
  const secs = STATE.timeLeft % 60;
  
  const timer = document.createElement('div');
  timer.className = 'timer-chip';
  timer.id = 'exam-timer';
  timer.innerHTML = `<span class="timer-dot"></span> ${mins < 10 ? '0' : ''}${mins}:${secs < 10 ? '0' : ''}${secs}`;
  app.appendChild(timer);

  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<h2>${exam.title}</h2><div class="meta">কোড: ${exam.id}</div><div id="questions-area"></div><button class="btn btn-gold btn-block" style="margin-top:20px;" onclick="submitExam()">📥 খাতা জমা দিন</button>`;

  const qArea = card.querySelector('#questions-area');
  exam.questions.forEach((q, qIdx) => {
    const qBlock = document.createElement('div');
    qBlock.className = 'q-block';
    qBlock.innerHTML = `<div class="q-text"><span class="q-num">${qIdx + 1}</span> ${q.q}</div><div class="options-container"></div>`;
    const optContainer = qBlock.querySelector('.options-container');
    q.o.forEach((opt, oIdx) => {
      const label = document.createElement('label');
      label.className = 'bubble-opt';
      label.innerHTML = `<input type="radio" name="q_${qIdx}" value="${oIdx}" onchange="saveAnswer(${qIdx}, ${oIdx})"><span class="bubble">${String.fromCharCode(65 + oIdx)}</span><span class="opt-text">${opt}</span>`;
      optContainer.appendChild(label);
    });
    qArea.appendChild(qBlock);
  });
  app.appendChild(card);
}

function saveAnswer(qIdx, oIdx) { STATE.userAnswers[qIdx] = oIdx; }

// ছাত্রের খাতার ফাইনাল সাবমিশন ও গুগল শিটে রেজাল্ট পাঠানো
function submitExam() {
  clearInterval(STATE.timer);
  const exam = STATE.activeExam;
  let score = 0;

  exam.questions.forEach((q, idx) => {
    if (STATE.userAnswers[idx] !== undefined && parseInt(STATE.userAnswers[idx]) === q.a) { score++; }
  });

  const resultRecord = { examId: exam.id, title: exam.title, score: score, total: exam.questions.length };
  STATE.studentResults.push(resultRecord);

  // গুগল শিটের 'Results' ট্যাবে খাতার মার্কস পুশ করা (action=submitResult)
  const resultUrl = `${WEB_APP_URL}?action=submitResult&examId=${encodeURIComponent(resultRecord.examId)}&title=${encodeURIComponent(resultRecord.title)}&score=${resultRecord.score}&total=${resultRecord.total}`;

  fetch(resultUrl, { method: 'GET', mode: 'no-cors' })
    .then(() => showToast('✅ গুগল শিটে খাতা সফলভাবে সংরক্ষিত হয়েছে!'))
    .catch(err => console.error(err));

  STATE.currentView = 'result';
  render();
}

function renderResultView(app) {
  const latestResult = STATE.studentResults[STATE.studentResults.length - 1];
  const pass = latestResult.score >= (latestResult.total / 2);
  const card = document.createElement('div');
  card.className = 'card center';
  card.innerHTML = `
    <h2>পরীক্ষার ফলাফল</h2><div class="meta">${latestResult.title}</div>
    <div style="margin:20px 0;"><span class="stamp ${pass ? '' : 'fail'}">${pass ? 'PASSED' : 'FAILED'}</span></div>
    <div class="q-text">প্রাপ্ত নম্বর: <span class="score-big ${pass ? 'score-pass' : 'score-fail'}" style="font-size:26px;">${latestResult.score}</span> / ${latestResult.total}</div>
    <a class="link-back" onclick="switchTab('student')">🔙 ড্যাশবোর্ডে ফিরে যান</a>
  `;
  app.appendChild(card);
}

// লোড অন স্টার্টআপ
loadExamsFromSheet();
render();
</script>
</body>
</html>
